# railway.toml — imprsn8 API
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder          = "railpack"
buildCommand     = "npm install --production"

[deploy]
startCommand         = "node src/server.js"
preDeployCommand     = ["node src/db/migrate.js"]
healthcheckPath      = "/health"
healthcheckTimeout   = 60
restartPolicyType    = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Production-only overrides
[environments.production.deploy]
restartPolicyMaxRetries = 5

# PR preview environments — lighter config, no seed
[environments.pr.deploy]
startCommand       = "node src/server.js"
preDeployCommand   = ["node src/db/migrate.js"]
healthcheckPath    = "/health"
healthcheckTimeout = 30
